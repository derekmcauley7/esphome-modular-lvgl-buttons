---
# Local sensor button tile — displays an ESPHome sensor value and triggers an ESPHome button on press.
# Simple type: tile-only, no detail page. Timed visual "active" state on press.
#
# vars:
#   uid:              unique identifier
#   entity_id:        ESPHome sensor component ID (must be defined before this tile)
#   action_entity_id: ESPHome button component ID (must be defined before this tile)
#   active_duration:  minutes the tile stays visually "on" after press (default: 30)
#   unit:             unit string appended to value, e.g. "°C" (optional, default "")
#   precision:        decimal places (optional, default 1)
#   row:              grid row
#   column:           grid column
#   text:             tile label
#   icon:             icon glyph
#   row_span:         (default: 1)
#   column_span:      (default: 1)
#   page_id:          parent page (default: main_page)
#   label_font:       font for the label
#   sensor_font:      font for the sensor value

globals:
- id: ${uid}_current_value
  type: float
  initial_value: '0.0'
- id: ${uid}_is_active
  type: bool
  initial_value: 'false'

lvgl:
  pages:
  - id: !extend ${page_id | default("main_page")}
    widgets:
    - container:
        id: ${uid}_tile
        grid_cell_row_pos: ${row}
        grid_cell_column_pos: ${column}
        grid_cell_row_span: ${row_span | default(1)}
        grid_cell_column_span: ${column_span | default(1)}
        grid_cell_x_align: stretch
        grid_cell_y_align: stretch
        widgets:
        - button:
            id: button_${uid}
            widgets:
            - label:
                id: icon_${uid}
                text_font: $icon_font
                align: top_left
                text_color: $icon_off_color
                text: ${icon}
            - label:
                id: label_${uid}
                align: bottom_left
                long_mode: wrap
                width: 70%
                text_color: $label_off_color
                text_font: ${label_font | default(text_font)}
                text: ${text}
            - label:
                id: value_${uid}
                align: top_right
                text_font: ${sensor_font | default(text_font)}
                text_color: $label_on_color
                text: "--"
            on_short_click:
              then:
              - script.execute: ${uid}_toggle_action

# ── Hook into the sensor's value changes ──────────────────────────────────────
sensor:
- id: !extend ${entity_id}
  on_value:
  - lambda: id(${uid}_current_value) = x;
  - script.execute: ${uid}_sync_state

script:
# ── Toggle action — press button and flip visual state ────────────────────────
- id: ${uid}_toggle_action
  then:
  - button.press: ${action_entity_id}
  - lambda: id(${uid}_is_active) = !id(${uid}_is_active);
  - if:
      condition:
        lambda: return id(${uid}_is_active);
      then:
      - script.execute: ${uid}_timer_expired
      else:
      - script.stop: ${uid}_timer_expired
  - script.execute: ${uid}_sync_state

# ── Timer — revert visual state after active_duration minutes ─────────────────
- id: ${uid}_timer_expired
  then:
  - delay: ${active_duration | default(30)}min
  - lambda: id(${uid}_is_active) = false;
  - script.execute: ${uid}_sync_state

# ── Sync globals → LVGL widgets ───────────────────────────────────────────────
- id: ${uid}_sync_state
  then:
  - lvgl.label.update:
      id: value_${uid}
      text: !lambda |-
        char buf[32];
        snprintf(buf, sizeof(buf), "%.*f", ${precision | default(1)}, id(${uid}_current_value));
        std::string s(buf);
        std::string unit = "${unit | default("")}";
        if (!unit.empty()) s += " " + unit;
        return s;
  - if:
      condition:
        lambda: return id(${uid}_is_active);
      then:
      - lvgl.widget.update:
          id: button_${uid}
          bg_color: $button_on_color
      - lvgl.widget.update:
          id: icon_${uid}
          text_color: $icon_on_color
      - lvgl.widget.update:
          id: label_${uid}
          text_color: $label_on_color
      else:
      - lvgl.widget.update:
          id: button_${uid}
          bg_color: $button_off_color
      - lvgl.widget.update:
          id: icon_${uid}
          text_color: $icon_off_color
      - lvgl.widget.update:
          id: label_${uid}
          text_color: $label_off_color
