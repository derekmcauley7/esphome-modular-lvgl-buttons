---
# Remote media player tile — controls a Home Assistant media player entity.
# Tile shows now-playing track info with play-state indicator.
# Short-click toggles play/pause. Long-press opens the detail page.
#
# vars:
#   uid:          unique identifier
#   entity_id:    HA media_player entity, e.g. "media_player.spotify"
#   row:          grid row
#   column:       grid column
#   text:         tile label
#   icon:         icon glyph (e.g. $mdi_spotify or $mdi_music_note)
#   row_span:     (default: 1)
#   column_span:  (default: 1)
#   page_id:      parent page (default: main_page)

packages:
  ${uid}_detail: !include
    file: detail.yaml
    vars:
      uid: ${uid}
      text: ${text}
      page_id: ${page_id | default("main_page")}

# ── TILE ──────────────────────────────────────────────────────────────────────

lvgl:
  pages:
  - id: !extend ${page_id | default("main_page")}
    widgets:
    - container:
        id: ${uid}_tile
        grid_cell_row_pos: ${row}
        grid_cell_column_pos: ${column}
        grid_cell_row_span: ${row_span | default(1)}
        grid_cell_column_span: ${column_span | default(1)}
        grid_cell_x_align: stretch
        grid_cell_y_align: stretch
        widgets:
        - button:
            id: button_${uid}
            bg_color: $button_off_color
            widgets:
            - label:
                id: icon_${uid}
                text_font: $icon_font
                align: top_left
                text_color: $icon_off_color
                text: ${icon}
            - label:
                id: label_${uid}
                align: bottom_left
                long_mode: DOT
                width: 85%
                text_color: $label_off_color
                text: ${text}
            # Play state indicator dot
            - obj:
                id: ${uid}_indicator_dot
                align: top_right
                x: -5
                y: 5
                width: 10
                height: 10
                radius: 5
                bg_color: gray
                border_width: 0
            on_short_click:
              then:
              - script.execute: ${uid}_media_play_pause
            on_long_press:
              then:
              - lvgl.page.show:
                  id: ${uid}_detail_page
                  animation: MOVE_LEFT
                  time: 300ms

# ── HA SENSORS ────────────────────────────────────────────────────────────────

text_sensor:
# Entity state (playing / paused / idle / off)
- platform: homeassistant
  id: ${uid}_ha_state
  entity_id: ${entity_id}
  internal: true
  on_value:
  - lambda: id(${uid}_is_playing) = (x == "playing");
  - script.execute: ${uid}_sync_state

# Track title
- platform: homeassistant
  id: ${uid}_ha_title
  entity_id: ${entity_id}
  attribute: media_title
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None";
      then:
      - lambda: id(${uid}_media_title) = x;
      - script.execute: ${uid}_sync_state

# Artist
- platform: homeassistant
  id: ${uid}_ha_artist
  entity_id: ${entity_id}
  attribute: media_artist
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None";
      then:
      - lambda: id(${uid}_media_artist) = x;
      - script.execute: ${uid}_sync_state

# Volume level (float as string, e.g. "0.65")
- platform: homeassistant
  id: ${uid}_ha_volume
  entity_id: ${entity_id}
  attribute: volume_level
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None" && !id(${uid}_volume_send)->is_running();
      then:
      - lambda: id(${uid}_current_volume) = atof(x.c_str());
      - script.execute: ${uid}_sync_state

# Media position (seconds as string)
- platform: homeassistant
  id: ${uid}_ha_position
  entity_id: ${entity_id}
  attribute: media_position
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None";
      then:
      - lambda: id(${uid}_media_position) = atof(x.c_str());

# Media duration (seconds as string)
- platform: homeassistant
  id: ${uid}_ha_duration
  entity_id: ${entity_id}
  attribute: media_duration
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None";
      then:
      - lambda: id(${uid}_media_duration) = atof(x.c_str());

# Shuffle state ("True" / "False")
- platform: homeassistant
  id: ${uid}_ha_shuffle
  entity_id: ${entity_id}
  attribute: shuffle
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None";
      then:
      - lambda: id(${uid}_is_shuffle) = (x == "True" || x == "true");
      - script.execute: ${uid}_sync_state

# Repeat mode ("off" / "one" / "all")
- platform: homeassistant
  id: ${uid}_ha_repeat
  entity_id: ${entity_id}
  attribute: repeat
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None";
      then:
      - lambda: |-
          if (x == "one") id(${uid}_repeat_mode) = 1;
          else if (x == "all") id(${uid}_repeat_mode) = 2;
          else id(${uid}_repeat_mode) = 0;
      - script.execute: ${uid}_sync_state

# ── ABSTRACT ACTION SCRIPTS — REMOTE IMPLEMENTATION ──────────────────────────

script:
- id: ${uid}_media_play_pause
  then:
  - homeassistant.action:
      action: media_player.media_play_pause
      data:
        entity_id: ${entity_id}

- id: ${uid}_media_next
  then:
  - homeassistant.action:
      action: media_player.media_next_track
      data:
        entity_id: ${entity_id}

- id: ${uid}_media_previous
  then:
  - homeassistant.action:
      action: media_player.media_previous_track
      data:
        entity_id: ${entity_id}

- id: ${uid}_media_set_volume
  then:
  - homeassistant.action:
      action: media_player.volume_set
      data:
        entity_id: ${entity_id}
      data_template:
        volume_level: "{{ vol|float }}"
      variables:
        vol: !lambda return id(${uid}_current_volume);

- id: ${uid}_media_shuffle_set
  then:
  - homeassistant.action:
      action: media_player.shuffle_set
      data:
        entity_id: ${entity_id}
      data_template:
        shuffle: "{{ shuf }}"
      variables:
        shuf: !lambda return id(${uid}_is_shuffle);

- id: ${uid}_media_repeat_set
  then:
  - homeassistant.action:
      action: media_player.repeat_set
      data:
        entity_id: ${entity_id}
      data_template:
        repeat: "{{ rpt }}"
      variables:
        rpt: !lambda |-
          int mode = id(${uid}_repeat_mode);
          if (mode == 1) return std::string("one");
          if (mode == 2) return std::string("all");
          return std::string("off");
